<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Homepage - Argyanto Nandana Nugraha</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background: rgba(102, 126, 234, 0.4);
            min-height: 100vh;
            padding-top: 70px;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .container {
            max-width: 800px;
            width: 100%;
            overflow: hidden;
            margin: 0 auto;
            flex: 1;
        }
        
        /* Fixed Navbar with Hamburger */
        .container-navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: linear-gradient(135deg, #2c3e50, #4a6583);
            padding: 15px 30px;
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .header-title {
            font-size: 1.5rem;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            letter-spacing: 1px;
            font-weight: 700;
            text-decoration: none;
        }
        
        /* Hamburger Menu */
        .hamburger {
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            width: 22px;
            height: 18px;
            background: transparent;
            border: none;
            cursor: pointer;
            padding: 0;
            z-index: 1001;
            appearance: none;
        }
        
        .hamburger span {
            width: 100%;
            height: 2.5px;
            background: white;
            border-radius: 2px;
            transition: all 0.3s ease-in-out;
            transform-origin: center;
        }
        
        .nav-menu {
            position: absolute;
            top: 60px;
            right: 30px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            padding: 10px 0;
            min-width: 180px;
            display: none;
            z-index: 1000;
            animation: fadeIn 0.3s ease-out;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .nav-menu.active {
            display: block;
        }
        
        .nav-item {
            padding: 10px 20px;
            color: #2c3e50;
            text-decoration: none;
            font-weight: 600;
            font-size: 1rem;
            display: block;
            transition: all 0.2s;
            border-radius: 5px;
            margin: 2px 0;
        }
        
        .nav-item:hover {
            background: #e3f2fd;
            color: #3498db;
            transform: translateX(5px);
        }
        
        .content {
            padding: 40px;
            text-align: center;
            min-height: calc(100vh - 140px);
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        
        .portfolio-title {
            font-size: 2.8rem;
            margin-bottom: 12px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            letter-spacing: 1px;
            font-weight: 700;
            color: #2c3e50;
        }
        
        .profile-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
        }
        
        .profile-image-container {
            width: 220px;
            height: 220px;
            border-radius: 50%;
            overflow: hidden;
            border: 4px solid #667eea;
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
            transition: transform 0.3s ease;
        }
        
        .profile-image-container:hover {
            transform: scale(1.05);
        }
        
        .profile-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .profile-info {
            display: flex;
            flex-direction: column;
            gap: 18px;
            width: 100%;
            max-width: 400px;
        }
        
        .info-item {
            display: flex;
            justify-content: space-between;
            padding: 14px 25px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 12px;
            border-left: 5px solid #667eea;
            box-shadow: 0 3px 10px rgba(0,0,0,0.1);
            font-size: 1.2rem;
            transition: transform 0.2s;
        }
        
        .info-item:hover {
            transform: translateX(5px);
        }
        
        .info-label {
            font-weight: 700;
            color: #2c3e50;
            min-width: 120px;
        }
        
        .info-value {
            color: #34495e;
            font-weight: 600;
        }
        
        .copyright {
            margin-top: 30px;
            font-size: 1rem;
            font-weight: 500;
            color: #2c3e50;
            text-align: center;
            opacity: 0.8;
            transition: opacity 0.3s;
        }
        
        .copyright:hover {
            opacity: 1;
        }
        
        @media (max-width: 600px) {
            body {
                padding-top: 60px;
            }
            
            .container-navbar {
                padding: 12px 20px;
            }
            
            .header-title {
                font-size: 1.3rem;
            }
            
            .hamburger {
                width: 20px;
                height: 16px;
            }
            
            .hamburger span {
                height: 2px;
            }
            
            .nav-menu {
                top: 50px;
                right: 20px;
                width: 160px;
                font-size: 0.95rem;
            }
            
            .portfolio-title {
                font-size: 2rem;
            }
            
            .content {
                padding: 30px 20px;
                min-height: calc(100vh - 120px);
            }
            
            .profile-image-container {
                width: 180px;
                height: 180px;
                border-width: 3px;
            }
            
            .info-item {
                padding: 12px 20px;
                font-size: 1.1rem;
                border-radius: 10px;
                border-left-width: 4px;
            }
            
            .info-label {
                min-width: 100px;
            }
            
            .copyright {
                margin-top: 25px;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <!-- Fixed Navbar with Hamburger Menu -->
    <div class="container-navbar">
        <a href="index.html" class="header-title">&lt;Aregy/&gt;</a>
        <button class="hamburger" id="hamburgerBtn" aria-label="Toggle navigation menu">
            <span></span>
            <span></span>
            <span></span>
        </button>
        <nav class="nav-menu" id="navMenu">
            <a href="1gjb.html" class="nav-item">Gerak Jatuh Bebas</a>
            <a href="2rotasi.html" class="nav-item">Rotasi Geometri</a>
            <a href="3matrix.html" class="nav-item">Operasi Matriks</a>
        </nav>
    </div>
    
    <div class="container">
        <div class="content">
            <div class="profile-section">
                <h1 class="portfolio-title">Portofolio Tugas Website Pembelajaran</h1>
                <div class="profile-image-container">
                    <img src="images/argysquare.jpg" alt="Argyanto Nandana Nugraha" class="profile-image">
                </div>
                <div class="profile-info">
                    <div class="info-item">
                        <span class="info-label">Nama:</span>
                        <span class="info-value">Argyanto Nandana Nugraha</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">No. Absen:</span>
                        <span class="info-value">03</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">Kelas:</span>
                        <span class="info-value">XI-2</span>
                    </div>
                </div>
                <div class="copyright">
                    © Argyanto Nandana Nugraha. All rights reserved.
                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const hamburgerBtn = document.getElementById('hamburgerBtn');
            const navMenu = document.getElementById('navMenu');
            const spans = hamburgerBtn.querySelectorAll('span');
            
            hamburgerBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                navMenu.classList.toggle('active');
                
                // Animate hamburger icon
                if (navMenu.classList.contains('active')) {
                    spans[0].style.transform = 'rotate(45deg) translate(5px, 5px)';
                    spans[1].style.opacity = '0';
                    spans[2].style.transform = 'rotate(-45deg) translate(5px, -5px)';
                    hamburgerBtn.setAttribute('aria-expanded', 'true');
                } else {
                    spans[0].style.transform = 'rotate(0deg) translate(0, 0)';
                    spans[1].style.opacity = '1';
                    spans[2].style.transform = 'rotate(0deg) translate(0, 0)';
                    hamburgerBtn.setAttribute('aria-expanded', 'false');
                }
            });
            
            // Close menu when clicking outside
            document.addEventListener('click', function(event) {
                if (!hamburgerBtn.contains(event.target) && !navMenu.contains(event.target) && navMenu.classList.contains('active')) {
                    navMenu.classList.remove('active');
                    spans[0].style.transform = 'rotate(0deg) translate(0, 0)';
                    spans[1].style.opacity = '1';
                    spans[2].style.transform = 'rotate(0deg) translate(0, 0)';
                    hamburgerBtn.setAttribute('aria-expanded', 'false');
                }
            });
            
            // Close menu when resizing to larger screen
            window.addEventListener('resize', function() {
                if (window.innerWidth > 600 && navMenu.classList.contains('active')) {
                    navMenu.classList.remove('active');
                    spans[0].style.transform = 'rotate(0deg) translate(0, 0)';
                    spans[1].style.opacity = '1';
                    spans[2].style.transform = 'rotate(0deg) translate(0, 0)';
                    hamburgerBtn.setAttribute('aria-expanded', 'false');
                }
            });
            
            // Handle image error with fallback
            const profileImage = document.querySelector('.profile-image');
            profileImage.onerror = function() {
                this.src = 'https://placehold.co/220x220/3498db/ffffff?text=A.N.N';
                this.alt = 'Foto tidak tersedia';
            };
        });
    </script>
</body>
</html>
